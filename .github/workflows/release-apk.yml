name: Build and Publish Tagged APK Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build APK and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify tag matches VERSION
        run: |
          TAG="${{ github.ref_name }}"

          if [[ ! -f VERSION ]]; then
            echo "VERSION file is missing."
            exit 1
          fi

          VERSION="$(cat VERSION | tr -d '[:space:]')"

          echo "Tag: $TAG"
          echo "VERSION: $VERSION"

          if [[ "$TAG" != "$VERSION" ]]; then
            echo "Tag must match VERSION."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build non-root debug APK for release testing
        run: ./gradlew --no-daemon clean assembleNonRootDebug

      - name: Collect APK files
        run: |
          mkdir -p release-artifacts
          find app/build/outputs/apk -name "*.apk" -type f -exec cp {} release-artifacts/ \;
          ls -la release-artifacts

      - name: Validate APK exists
        run: |
          APK_COUNT=$(find release-artifacts -name "*.apk" | wc -l)
          if [[ "$APK_COUNT" -eq 0 ]]; then
            echo "No APK files were generated."
            exit 1
          fi

      - name: Prepare release notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSIONED_NOTES="RELEASE_NOTES/${TAG}.md"
          NOTES_FILE="release-notes.md"

          if [[ -f "$VERSIONED_NOTES" ]]; then
            cp "$VERSIONED_NOTES" "$NOTES_FILE"
          else
            cat > "$NOTES_FILE" <<EOF
          # Release $TAG

          Built from tag: $TAG
          Commit: ${{ github.sha }}

          APK files are attached to this release.
          EOF
          fi

          echo "Release notes:"
          cat "$NOTES_FILE"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.ref_name }}
          path: release-artifacts/*.apk
          if-no-files-found: error

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          gh release create "$TAG" \
            release-artifacts/*.apk \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag
