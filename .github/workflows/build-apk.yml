name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/build-apk.yml"
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-nonroot-debug-apk:
    name: Build non-root debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build non-root debug APK
        run: ./gradlew --no-daemon clean assembleNonRootDebug

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/nonRoot/debug/*.apk artifacts/
          ls -la artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-android-nonroot-debug-apk
          path: artifacts/*.apk
          if-no-files-found: error
