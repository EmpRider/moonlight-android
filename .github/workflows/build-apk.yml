name: Build Android APK Validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: build-validation-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-nonroot-debug-apk:
    name: Build non-root debug APK validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build non-root debug APK
        run: ./gradlew --no-daemon clean assembleNonRootDebug

      - name: Upload validation APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-android-validation-apk
          path: app/build/outputs/apk/nonRoot/debug/*.apk
          if-no-files-found: error
